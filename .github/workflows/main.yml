name: Atualizacao Diaria Caixa

on:
  schedule:
    - cron: '0 14 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Dependencias
        run: pip install -r requirements.txt

      - name: Executar o Robo CVM
        run: python robo_cvm.py

      - name: Salvar Resultados no GitHub
        run: |
          git config --global user.name "actions-user"
          git config --global user.email "action@github.com"
          git add dados_atuais.csv sipii_caixa_*.csv sipii_caixa_*.xlsx
          git diff --cached --quiet || git commit -m "Dados atualizados via Robo: $(date)"
          git push
