name: Catalogo Fundos CVM

on:
  schedule:
    - cron: "0 23 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gerar-catalogo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Executar robo_cvm.py
        run: python robo_cvm.py --modo-cvm --saida ./saida
        timeout-minutes: 30

      - name: Commit e push dos resultados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add saida/
          git diff --cached --quiet || git commit -m "Auto: catalogo atualizado $(date +'%d/%m/%Y %H:%M')"
          git push
